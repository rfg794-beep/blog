<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テヌキスト ブログ投稿くん</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --accent: #c84b2f;
    --accent2: #e8a020;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e0d9ce;
    --success: #2d7a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
  }

  header {
    text-align: center;
    padding: 32px 0 28px;
    border-bottom: 3px solid var(--text);
    margin-bottom: 32px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    height: 2px;
    background: var(--accent);
    margin-top: 4px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(22px, 6vw, 36px);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }

  .card {
    background: var(--surface);
    border: 2px solid var(--text);
    border-radius: 2px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0 var(--text);
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Shippori Mincho', serif;
  }

  textarea, input[type="text"], input[type="password"] {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 2px;
    padding: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  textarea:focus, input:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.7;
  }

  .field + .field {
    margin-top: 16px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.1em;
    border: 2px solid var(--text);
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 4px 4px 0 var(--text);
    margin-top: 8px;
  }

  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--text);
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-secondary {
    background: var(--accent2);
    color: white;
  }

  .btn-ghost {
    background: var(--surface);
    color: var(--text);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: 4px 4px 0 var(--text);
  }

  .status {
    text-align: center;
    font-size: 13px;
    padding: 10px;
    border-radius: 2px;
    margin-top: 12px;
    font-weight: 700;
    display: none;
  }

  .status.loading {
    display: block;
    background: #fff8e6;
    border: 2px solid var(--accent2);
    color: var(--accent2);
  }

  .status.success {
    display: block;
    background: #e8f5ed;
    border: 2px solid var(--success);
    color: var(--success);
  }

  .status.error {
    display: block;
    background: #fdf0ee;
    border: 2px solid var(--accent);
    color: var(--accent);
  }

  .result-area {
    display: none;
  }

  .result-area.visible {
    display: block;
  }

  .result-title-input {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .result-text {
    width: 100%;
    min-height: 300px;
    border: 2px solid var(--border);
    border-radius: 2px;
    padding: 16px;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    line-height: 1.9;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    outline: none;
  }

  .result-text:focus {
    border-color: var(--accent);
  }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .wp-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
  }

  .toggle-wp {
    background: none;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .wp-fields {
    display: none;
    margin-top: 16px;
  }

  .wp-fields.open {
    display: block;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 1px;
    vertical-align: middle;
    margin-left: 8px;
  }

  .tip {
    background: #fff8e6;
    border-left: 3px solid var(--accent2);
    padding: 10px 14px;
    font-size: 12px;
    color: #664;
    margin-top: 12px;
    line-height: 1.7;
    font-family: 'Shippori Mincho', serif;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .length-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .len-btn {
    flex: 1;
    min-width: 60px;
    padding: 10px 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid var(--border);
    border-radius: 2px;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .len-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .len-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 3px 3px 0 var(--text);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .loading-text {
    animation: pulse 1.2s ease-in-out infinite;
  }
</style>
</head>
<body>

<header>
  <div class="logo">tenukit blog writer</div>
  <h1>テヌキスト<span>ブログ投稿くん</span></h1>
  <p class="subtitle">ネタを投げるだけで記事になる。それがテヌキスト流。</p>
</header>

<!-- API設定 -->
<div class="card">
  <div class="card-title">API設定</div>
  <div class="field">
    <label>Claude API Key</label>
    <div class="hint">Anthropic Consoleから取得したAPIキー</div>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>
</div>

<!-- ネタ入力 -->
<div class="card">
  <div class="card-title">ネタを投げる</div>
  <div class="field">
    <label>記事のネタメモ <span class="badge">必須</span></label>
    <div class="hint">箇条書きでも走り書きでもOK。雑に投げてください。</div>
    <textarea id="memo" placeholder="例：
・純正らーめんにごま油・ガーリックパウダー・醤油・米油を追加
・ジャンクガレッジ風になった
・無添加系なのに添加してる矛盾がある
・でも自分で選んだものを足すのは違う（という謎理論）"></textarea>
  </div>

  <div class="field">
    <label>文体の指示（任意）</label>
    <div class="hint">デフォルトは「手抜きテヌキストらしいゆるい文体」で生成します</div>
    <input type="text" id="styleNote" placeholder="例：もっとゆるく、関西弁っぽく、など">
  </div>

  <div class="field">
    <label>文字数</label>
    <div class="hint">生成する記事のおおよその文字数を選んでください</div>
    <div class="length-selector">
      <button class="len-btn" data-len="500">500字</button>
      <button class="len-btn" data-len="800">800字</button>
      <button class="len-btn active" data-len="1000">1000字</button>
      <button class="len-btn" data-len="1200">1200字</button>
      <button class="len-btn" data-len="1500">1500字</button>
    </div>
  </div>

  <button class="btn btn-primary" id="generateBtn" onclick="generateArticle()">
    ✦ 記事を生成する
  </button>
  <div class="status" id="genStatus"></div>
</div>

<!-- 生成結果 -->
<div class="card result-area" id="resultArea">
  <div class="card-title">生成された記事</div>

  <div class="field">
    <label>タイトル</label>
    <input type="text" class="result-title-input" id="resultTitle">
  </div>

  <div class="field">
    <label>本文</label>
    <textarea class="result-text" id="resultBody" oninput="updateCount()"></textarea>
    <div class="char-count" id="charCount">0文字</div>
  </div>

  <div class="tip">
    💡 自由に編集できます。納得したらWordPressに下書き投稿しましょう。
  </div>

  <div class="wp-section">
    <button class="toggle-wp" onclick="toggleWP()">
      <span id="wpToggleIcon">▶</span> WordPress設定を開く
    </button>
    <div class="wp-fields" id="wpFields">
      <div class="divider"></div>
      <div class="field">
        <label>WordPress URL</label>
        <input type="text" id="wpUrl" placeholder="https://haragahetta.net" value="https://haragahetta.net">
      </div>
      <div class="field">
        <label>ユーザー名</label>
        <input type="text" id="wpUser" placeholder="haragahetta" value="haragahetta">
      </div>
      <div class="field">
        <label>アプリケーションパスワード</label>
        <div class="hint">WordPress管理画面 → ユーザー → プロフィール → アプリケーションパスワード</div>
        <input type="password" id="wpPass" placeholder="xxxx xxxx xxxx xxxx xxxx xxxx" autocomplete="off">
      </div>
      <button class="btn btn-secondary" onclick="postToWP()" style="margin-top:16px">
        📝 WordPressに下書き投稿
      </button>
      <div class="status" id="wpStatus"></div>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは「無添加系テヌキスト」という個性的なブロガーの代筆AIです。

【このブロガーのキャラクター】
- 手を抜くことに全力を注ぐ「テヌキスト」。手抜きへの後ろめたさはゼロ、完全肯定。
- 「手抜き＝サボり」ではなく「手抜き＝最適化」。セオリーを疑い、別ルートが実は最短だったりする。
- 無添加・添加物には気を使うが、手間は極力省きたい。この矛盾を笑える。
- すべて自分で体験したことだけを書く。誰かの真似でも自分流にポンコツ化して再現する。
- 完璧じゃないから真似しやすい。ハードルを下げることに努力する。「頑張って手抜きする」人。
- 読者に「面白いことするな、けど真面目だよな、アホみたいだけど根底に優しさがある」と思われたい。
- マニュアルは正解じゃなく手段のひとつ。楽して笑っていたいから最適ルートを探り続ける。共感した人はガンガン真似してほしい、という姿勢。

【笑いの構造（必ず意識すること）】
- 「仮説→予想外の結果→ツッコミ」の流れが笑いになる。
- 初めてやることはすべて実験。「違う、そうじゃない」という裏切りがオチになる。
- ポンコツな行動をとって、なぜかうまくいって、ニヤッとする。オチは作るものではなく実体験がすでにオチになっている。

【読者との距離感】
- 独り言を書いているが、半分は共感してほしい。ちらっと横目で見てる感じ。
- 押しつけず、勝手にやってるのを見せている。共感した人はどうぞ、というスタンス。

【文体・口癖（必ず反映すること）】
- 「〜と思うんだよね」「〜かもね」を自然に使う
- 自信があっても「〜かもね」と断言を避ける
- 「いや、やりましょう。」のような急な決断・切り替えのリズムを使う
- 「いや〜、〇〇ですよね、△△。」のような倒置・体言止めを使う
- 体言止め多め
- 関西弁・「めっちゃ」は使わない
- 標準語ベースで、ゆるい話し言葉トーン

【記事の構成】
1. 導入：読者が何に困っているかを起点に、共感や問題提起から入る
2. 本題：自分の実験・体験を具体的に。仮説と結果のギャップを正直に書く
3. 手順や詳細：箇条書きより文章で。見出しは3つ程度を目安に
4. オチ：「ポンコツ→なぜかうまくいく→ニヤッ」の流れで締める。作らず体験から自然に出す

【タイトルの作り方】
- 最小限の言葉で「たぶんこういう内容だろう」と思わせる
- 読んでみたら他の記事とは違う切り口だった、という意外性を狙う
- 釣りではなく、中身でちゃんと裏切る

【SEOの考え方】
- 読者が何に困っているかを起点にキーワードを自然に入れる
- 見出しを3つ程度使って記事を構成する
- 検索キーワードを詰め込まず、読んで自然な文章を優先する

文字数：{LENGTH}字程度

出力形式（必ずこの形式で出力）：
TITLE: （タイトル）
BODY:
（本文。見出しは ## で記述すること）`;

async function generateArticle() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const memo = document.getElementById('memo').value.trim();
  const styleNote = document.getElementById('styleNote').value.trim();
  const selectedLen = document.querySelector('.len-btn.active')?.dataset.len || '1000';

  if (!apiKey) return showStatus('genStatus', 'error', 'APIキーを入力してください');
  if (!memo) return showStatus('genStatus', 'error', 'ネタメモを入力してください');

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  showStatus('genStatus', 'loading', '<span class="loading-text">✦ Claudeが記事を書いています...</span>');

  const systemPrompt = SYSTEM_PROMPT.replace('{LENGTH}', selectedLen);

  const userPrompt = `以下のネタメモをもとに、テヌキストらしいブログ記事を書いてください。

ネタメモ：
${memo}

${styleNote ? `文体の追加指示：${styleNote}` : ''}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'APIエラー');
    }

    const data = await res.json();
    const text = data.content[0].text;

    // タイトルと本文をパース
    const titleMatch = text.match(/TITLE:\s*(.+)/);
    const bodyMatch = text.match(/BODY:\s*([\s\S]+)/);

    const title = titleMatch ? titleMatch[1].trim() : '（タイトルを入力）';
    const body = bodyMatch ? bodyMatch[1].trim() : text;

    document.getElementById('resultTitle').value = title;
    document.getElementById('resultBody').value = body;
    updateCount();

    document.getElementById('resultArea').classList.add('visible');
    showStatus('genStatus', 'success', '✓ 記事が生成されました！内容を確認・編集してください');

    // WordPress設定を自動で開く
    document.getElementById('wpFields').classList.add('open');
    document.getElementById('wpToggleIcon').textContent = '▼';

    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (e) {
    showStatus('genStatus', 'error', 'エラー: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function postToWP() {
  const url = document.getElementById('wpUrl').value.trim().replace(/\/$/, '');
  const user = document.getElementById('wpUser').value.trim();
  const pass = document.getElementById('wpPass').value.trim();
  const title = document.getElementById('resultTitle').value.trim();
  const body = document.getElementById('resultBody').value.trim();

  if (!url || !user || !pass) return showStatus('wpStatus', 'error', 'WordPress設定を入力してください');
  if (!title || !body) return showStatus('wpStatus', 'error', 'タイトルと本文を確認してください');

  showStatus('wpStatus', 'loading', '<span class="loading-text">📝 WordPressに投稿中...</span>');

  const credentials = btoa(`${user}:${pass}`);

  // 本文を段落タグに変換
  const htmlBody = body.split('\n\n')
    .filter(p => p.trim())
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('\n');

  try {
    const res = await fetch(`${url}/wp-json/wp/v2/posts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Basic ${credentials}`
      },
      body: JSON.stringify({
        title: title,
        content: htmlBody,
        status: 'draft'
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || '投稿エラー');
    }

    const post = await res.json();
    showStatus('wpStatus', 'success', `✓ 下書き保存しました！WordPressアプリで確認して公開してください`);

  } catch (e) {
    showStatus('wpStatus', 'error', 'エラー: ' + e.message + '（CORSエラーの場合はサーバー設定が必要です）');
  }
}

function toggleWP() {
  const fields = document.getElementById('wpFields');
  const icon = document.getElementById('wpToggleIcon');
  fields.classList.toggle('open');
  icon.textContent = fields.classList.contains('open') ? '▼' : '▶';
}

function updateCount() {
  const text = document.getElementById('resultBody').value;
  document.getElementById('charCount').textContent = text.length + '文字';
}

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

// 文字数ボタンの切り替え
document.querySelectorAll('.len-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.len-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>

</body>
</html>
